<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudentOS — Your life, one system</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
/* ============ TOKENS ============ */
:root {
  --font-ui: "Instrument Sans", -apple-system, "SF Pro Text", "Segoe UI", sans-serif;
  --font-data: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

  /* module signal hues (shared across themes) */
  --hue-health: #F0648C;
  --hue-sleep: #7C8CF8;
  --hue-nutrition: #4FC97B;
  --hue-workout: #F59E0B;
  --hue-finance: #2DD4BF;
  --hue-study: #A78BFA;
  --hue-habits: #E8B93B;
  --hue-goals: #38BDF8;
  --hue-coach: #E879F9;
  --hue-notes: #84CC16;
  --hue-calendar: #FB7185;

  --r-sm: 8px; --r-md: 12px; --r-lg: 16px;
  --sidebar-w: 232px;
}
[data-theme="dark"] {
  color-scheme: dark;
  --bg: #0B0D11;
  --surface: #12151B;
  --surface-2: #181C24;
  --surface-hover: #1D222B;
  --border: rgba(255,255,255,0.07);
  --border-strong: rgba(255,255,255,0.13);
  --text: #E7EAF0;
  --text-2: #9AA3B2;
  --text-3: #626B7A;
  --accent: #7C7FF2;
  --accent-soft: rgba(124,127,242,0.14);
  --pos: #4FC97B;
  --neg: #F0648C;
  --chart-grid: rgba(255,255,255,0.05);
  --shadow: 0 8px 28px rgba(0,0,0,0.4);
  --statusbar-bg: rgba(11,13,17,0.85);
}
[data-theme="light"] {
  color-scheme: light;
  --bg: #F6F7F9;
  --surface: #FFFFFF;
  --surface-2: #F1F3F6;
  --surface-hover: #EBEEF2;
  --border: rgba(15,23,42,0.08);
  --border-strong: rgba(15,23,42,0.16);
  --text: #14181F;
  --text-2: #5B6472;
  --text-3: #98A1B0;
  --accent: #5A5DE0;
  --accent-soft: rgba(90,93,224,0.10);
  --pos: #1FA45B;
  --neg: #D93E6A;
  --chart-grid: rgba(15,23,42,0.05);
  --shadow: 0 8px 28px rgba(15,23,42,0.08);
  --statusbar-bg: rgba(246,247,249,0.85);
}

/* ============ BASE ============ */
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 15px; }
body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  height: 100vh;
}
button { font-family: inherit; color: inherit; background: none; border: none; cursor: pointer; }
input { font-family: inherit; color: inherit; }
::selection { background: var(--accent-soft); }
.mono { font-family: var(--font-data); font-variant-numeric: tabular-nums; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

/* ============ SYSTEM STATUS BAR (signature) ============ */
.statusbar {
  height: 34px;
  display: flex; align-items: center; gap: 0;
  padding: 0 16px;
  font-family: var(--font-data); font-size: 11.5px; font-weight: 500;
  color: var(--text-2);
  border-bottom: 1px solid var(--border);
  background: var(--statusbar-bg);
  backdrop-filter: blur(12px);
  user-select: none;
  white-space: nowrap; overflow-x: auto; scrollbar-width: none;
}
.statusbar::-webkit-scrollbar { display: none; }
.sb-brand { color: var(--text); font-weight: 600; letter-spacing: 0.02em; }
.sb-brand .cursor { display: inline-block; width: 7px; height: 13px; background: var(--accent); margin-left: 5px; vertical-align: -2px; animation: blink 1.2s steps(1) infinite; }
@keyframes blink { 50% { opacity: 0; } }
.sb-sep { color: var(--text-3); margin: 0 10px; }
.sb-item { display: inline-flex; align-items: center; gap: 6px; }
.sb-item b { color: var(--text); font-weight: 600; }
.sb-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.sb-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
.sb-date { color: var(--text-3); }

/* ============ LAYOUT ============ */
.frame { display: flex; height: calc(100vh - 34px); }
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 14px 10px 12px;
  background: var(--bg);
}
.side-search {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; margin: 0 4px 14px;
  border: 1px solid var(--border); border-radius: var(--r-sm);
  color: var(--text-3); font-size: 13px;
  background: var(--surface);
  transition: border-color .15s;
}
.side-search:hover { border-color: var(--border-strong); }
.side-search kbd {
  margin-left: auto; font-family: var(--font-data); font-size: 10px;
  padding: 2px 5px; border: 1px solid var(--border); border-radius: 4px; color: var(--text-3);
}
.nav-label { font-size: 10.5px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); padding: 12px 12px 6px; }
.nav-item {
  display: flex; align-items: center; gap: 10px; width: 100%;
  padding: 7px 12px; border-radius: var(--r-sm);
  font-size: 13.5px; font-weight: 500; color: var(--text-2);
  transition: background .12s, color .12s;
  text-align: left;
}
.nav-item:hover { background: var(--surface-hover); color: var(--text); }
.nav-item.active { background: var(--surface-2); color: var(--text); }
.nav-item .sig { width: 7px; height: 7px; border-radius: 2.5px; background: var(--sig, var(--text-3)); flex-shrink: 0; opacity: .55; transition: opacity .12s; }
.nav-item.active .sig, .nav-item:hover .sig { opacity: 1; }
.nav-item .badge { margin-left: auto; font-family: var(--font-data); font-size: 10.5px; color: var(--text-3); }
.side-footer { margin-top: auto; padding: 12px 8px 0; border-top: 1px solid var(--border); }
.xp-row { display: flex; align-items: center; gap: 10px; padding: 4px; }
.xp-avatar { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--hue-coach)); display: grid; place-items: center; font-size: 12px; font-weight: 700; color: #fff; }
.xp-meta { flex: 1; min-width: 0; }
.xp-name { font-size: 12.5px; font-weight: 600; }
.xp-level { font-family: var(--font-data); font-size: 10.5px; color: var(--text-3); }
.xp-bar { height: 3px; border-radius: 2px; background: var(--surface-2); margin-top: 4px; overflow: hidden; }
.xp-bar i { display: block; height: 100%; width: 62%; background: var(--accent); border-radius: 2px; }

.main { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
.view { max-width: 1120px; margin: 0 auto; padding: 32px 36px 80px; display: none; }
.view.active { display: block; animation: viewIn .25s ease; }
@keyframes viewIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* ============ COMPONENTS ============ */
.view-head { margin-bottom: 24px; }
.view-eyebrow { font-family: var(--font-data); font-size: 11px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; color: var(--mod-hue, var(--accent)); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.view-title { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
.view-sub { font-size: 13.5px; color: var(--text-2); margin-top: 6px; max-width: 60ch; }

.grid { display: grid; gap: 14px; }
.g-4 { grid-template-columns: repeat(4, 1fr); }
.g-3 { grid-template-columns: repeat(3, 1fr); }
.g-2 { grid-template-columns: repeat(2, 1fr); }
.g-23 { grid-template-columns: 2fr 1fr; }
.g-32 { grid-template-columns: 1fr 2fr; }
.mt { margin-top: 14px; }
.mt-lg { margin-top: 28px; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 18px;
}
.card-title { font-size: 13px; font-weight: 600; color: var(--text); display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 14px; }
.card-title .hint { font-size: 11px; font-weight: 500; color: var(--text-3); }

.metric { padding: 16px 18px; }
.metric .m-label { font-size: 12px; font-weight: 500; color: var(--text-2); display: flex; align-items: center; gap: 7px; }
.metric .m-value { font-family: var(--font-data); font-size: 24px; font-weight: 600; letter-spacing: -0.01em; margin-top: 8px; }
.metric .m-value small { font-size: 13px; color: var(--text-3); font-weight: 500; }
.metric .m-delta { font-family: var(--font-data); font-size: 11.5px; margin-top: 6px; }
.up { color: var(--pos); } .down { color: var(--neg); } .flat { color: var(--text-3); }

.chart-box { position: relative; height: 240px; }
.chart-box.tall { height: 300px; }
.chart-box.short { height: 170px; }

table.data { width: 100%; border-collapse: collapse; font-size: 13px; }
table.data th { text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text-3); padding: 0 10px 10px; border-bottom: 1px solid var(--border); }
table.data td { padding: 10px; border-bottom: 1px solid var(--border); color: var(--text-2); }
table.data td:first-child, table.data th:first-child { padding-left: 4px; }
table.data tr:last-child td { border-bottom: none; }
table.data td.num { font-family: var(--font-data); font-variant-numeric: tabular-nums; color: var(--text); }
table.data td b { color: var(--text); font-weight: 600; }

.pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; background: var(--surface-2); color: var(--text-2); }
.pill.c { background: color-mix(in srgb, var(--pc, var(--accent)) 14%, transparent); color: var(--pc, var(--accent)); }

.bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; font-size: 12.5px; }
.bar-row:last-child { margin-bottom: 0; }
.bar-row .br-label { width: 110px; flex-shrink: 0; color: var(--text-2); font-weight: 500; }
.bar-row .br-track { flex: 1; height: 6px; background: var(--surface-2); border-radius: 3px; overflow: hidden; }
.bar-row .br-fill { height: 100%; border-radius: 3px; background: var(--bc, var(--accent)); transition: width .6s cubic-bezier(.2,.8,.2,1); }
.bar-row .br-val { font-family: var(--font-data); font-size: 11.5px; color: var(--text-2); width: 86px; text-align: right; flex-shrink: 0; }

.insight {
  display: flex; gap: 12px; padding: 14px 16px;
  border: 1px solid var(--border); border-radius: var(--r-md);
  background: var(--surface); margin-bottom: 10px;
}
.insight:last-child { margin-bottom: 0; }
.insight .i-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; background: var(--ic, var(--accent)); }
.insight .i-title { font-size: 13px; font-weight: 600; }
.insight .i-body { font-size: 12.5px; color: var(--text-2); margin-top: 3px; line-height: 1.55; }
.insight .i-meta { font-family: var(--font-data); font-size: 10.5px; color: var(--text-3); margin-top: 7px; }

.ring-wrap { display: flex; align-items: center; gap: 16px; }
.ring { transform: rotate(-90deg); }
.ring .track { stroke: var(--surface-2); }
.ring .prog { stroke-linecap: round; transition: stroke-dashoffset .8s cubic-bezier(.2,.8,.2,1); }

.dot-matrix { display: grid; grid-template-columns: repeat(14, 1fr); gap: 5px; }
.dm-cell { aspect-ratio: 1; border-radius: 4px; background: var(--surface-2); }
.dm-cell.on { background: var(--dc, var(--pos)); }
.dm-cell.today { outline: 1.5px solid var(--border-strong); outline-offset: 1px; }

.heatmap { display: grid; grid-template-columns: 34px repeat(24, 1fr); gap: 3px; font-family: var(--font-data); font-size: 9.5px; color: var(--text-3); }
.hm-cell { aspect-ratio: 1.15; border-radius: 3px; background: var(--surface-2); }
.hm-label { display: flex; align-items: center; }

.quick { display: flex; gap: 8px; flex-wrap: wrap; }
.quick button {
  padding: 7px 13px; border: 1px solid var(--border); border-radius: var(--r-sm);
  font-size: 12.5px; font-weight: 500; color: var(--text-2); background: var(--surface);
  transition: all .13s;
}
.quick button:hover { border-color: var(--border-strong); color: var(--text); transform: translateY(-1px); }

.svc-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.svc-row:last-child { border-bottom: none; }
.svc-icon { width: 34px; height: 34px; border-radius: 9px; background: var(--surface-2); display: grid; place-items: center; font-size: 13px; font-weight: 700; color: var(--text-2); flex-shrink: 0; }
.svc-meta { flex: 1; min-width: 0; }
.svc-name { font-size: 13.5px; font-weight: 600; display: flex; align-items: center; gap: 7px; }
.svc-desc { font-size: 11.5px; color: var(--text-3); margin-top: 1px; }
.svc-count { font-family: var(--font-data); font-size: 11px; color: var(--text-3); margin-right: 6px; }
.svc-btn { padding: 6px 13px; border-radius: var(--r-sm); font-size: 12px; font-weight: 600; border: 1px solid var(--border); background: var(--surface); color: var(--text-2); transition: all .13s; flex-shrink: 0; }
.svc-btn:hover { border-color: var(--border-strong); color: var(--text); }
.svc-btn.on { background: color-mix(in srgb, var(--hue-notes) 14%, transparent); color: var(--hue-notes); border-color: transparent; }
.svc-dot-live { width: 7px; height: 7px; border-radius: 50%; background: var(--pos); flex-shrink: 0; }

.cal-day-label { font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--text-3); margin: 16px 0 8px; }
.cal-day-label:first-child { margin-top: 0; }
.cal-row { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--border); }
.cal-row:last-child { border-bottom: none; }
.cal-time { font-family: var(--font-data); font-size: 11.5px; color: var(--text-3); width: 90px; flex-shrink: 0; }
.cal-title { font-size: 13px; font-weight: 500; flex: 1; min-width: 0; }

/* ============ COMMAND PALETTE ============ */
.palette-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.4); backdrop-filter: blur(2px);
  display: none; align-items: flex-start; justify-content: center; padding-top: 14vh;
}
.palette-overlay.open { display: flex; }
.palette {
  width: min(560px, calc(100vw - 32px));
  background: var(--surface); border: 1px solid var(--border-strong);
  border-radius: var(--r-lg); box-shadow: var(--shadow); overflow: hidden;
  animation: palIn .18s cubic-bezier(.2,.8,.2,1);
}
@keyframes palIn { from { opacity: 0; transform: scale(.97) translateY(-8px); } to { opacity: 1; transform: none; } }
.palette input { width: 100%; padding: 16px 18px; font-size: 15px; background: none; border: none; outline: none; border-bottom: 1px solid var(--border); }
.pal-list { max-height: 320px; overflow-y: auto; padding: 6px; }
.pal-item { display: flex; align-items: center; gap: 11px; width: 100%; padding: 9px 12px; border-radius: var(--r-sm); font-size: 13.5px; color: var(--text-2); text-align: left; }
.pal-item:hover, .pal-item.sel { background: var(--surface-hover); color: var(--text); }
.pal-item .sig { width: 7px; height: 7px; border-radius: 2.5px; background: var(--sig, var(--text-3)); }
.pal-item .k { margin-left: auto; font-family: var(--font-data); font-size: 10px; color: var(--text-3); }
.pal-empty { padding: 24px; text-align: center; font-size: 13px; color: var(--text-3); }

/* ============ COACH CHAT ============ */
.chat-frame { display: flex; flex-direction: column; height: calc(100vh - 34px - 210px); min-height: 420px; border: 1px solid var(--border); border-radius: var(--r-lg); background: var(--surface); overflow: hidden; }
.chat-scroll { flex: 1; overflow-y: auto; padding: 22px; display: flex; flex-direction: column; gap: 16px; }
.msg { max-width: 72%; padding: 11px 15px; border-radius: 14px; font-size: 13.5px; line-height: 1.6; }
.msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
.msg.ai { align-self: flex-start; background: var(--surface-2); border-bottom-left-radius: 4px; color: var(--text); }
.msg.ai .src { display: block; margin-top: 8px; font-family: var(--font-data); font-size: 10px; color: var(--text-3); }
.msg.ai b { font-weight: 600; }
.chat-input-row { display: flex; gap: 10px; padding: 12px; border-top: 1px solid var(--border); }
.chat-input-row input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); font-size: 13.5px; outline: none; }
.chat-input-row input:focus { border-color: var(--accent); }
.chat-send { padding: 10px 18px; border-radius: 10px; background: var(--accent); color: #fff; font-weight: 600; font-size: 13px; }
.chat-send:hover { filter: brightness(1.1); }
.typing { display: inline-flex; gap: 4px; padding: 14px 16px; }
.typing i { width: 6px; height: 6px; border-radius: 50%; background: var(--text-3); animation: tp 1s infinite; }
.typing i:nth-child(2) { animation-delay: .15s; } .typing i:nth-child(3) { animation-delay: .3s; }
@keyframes tp { 30% { transform: translateY(-4px); opacity: 1; } }

/* ============ BRIEFING ============ */
.brief-doc { border: 1px solid var(--border); border-radius: var(--r-lg); background: var(--surface); padding: 34px 38px; max-width: 720px; }
.brief-doc .b-date { font-family: var(--font-data); font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--text-3); }
.brief-doc h2 { font-size: 24px; letter-spacing: -0.02em; margin: 10px 0 4px; }
.brief-doc .b-lede { color: var(--text-2); font-size: 14px; line-height: 1.6; }
.brief-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; margin: 26px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.brief-grid > div { padding: 16px 10px; border-right: 1px solid var(--border); }
.brief-grid > div:last-child { border-right: none; }
.brief-grid .bg-l { font-size: 11px; color: var(--text-3); font-weight: 500; }
.brief-grid .bg-v { font-family: var(--font-data); font-size: 18px; font-weight: 600; margin-top: 5px; }
.brief-recs { list-style: none; }
.brief-recs li { display: flex; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--border); font-size: 13.5px; color: var(--text-2); line-height: 1.55; }
.brief-recs li:last-child { border-bottom: none; }
.brief-recs .n { font-family: var(--font-data); font-size: 11px; color: var(--accent); font-weight: 600; padding-top: 2px; }

/* ============ TOPBAR ACTIONS ============ */
.theme-btn, .icon-btn { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 6px; color: var(--text-2); }
.theme-btn:hover, .icon-btn:hover { background: var(--surface-hover); color: var(--text); }

/* ============ RESPONSIVE ============ */
.menu-btn { display: none; }
@media (max-width: 1024px) {
  .g-4 { grid-template-columns: repeat(2, 1fr); }
  .g-23, .g-32, .g-3 { grid-template-columns: 1fr; }
  .view { padding: 24px 20px 64px; }
}
@media (max-width: 760px) {
  .sidebar { position: fixed; left: 0; top: 34px; bottom: 0; z-index: 60; transform: translateX(-100%); transition: transform .22s cubic-bezier(.2,.8,.2,1); box-shadow: var(--shadow); }
  .sidebar.open { transform: none; }
  .menu-btn { display: inline-flex; }
  .g-4 { grid-template-columns: 1fr 1fr; }
  .msg { max-width: 88%; }
  .brief-grid { grid-template-columns: 1fr 1fr; }
  .brief-grid > div:nth-child(2n) { border-right: none; }
  .brief-doc { padding: 24px 20px; }
}
</style>
</head>
<body>
<!-- ============ SYSTEM STATUS BAR ============ -->
<div class="statusbar" id="statusbar" aria-label="System status">
  <button class="menu-btn icon-btn" id="menuBtn" aria-label="Toggle navigation">☰</button>
  <span class="sb-brand">StudentOS<span class="cursor"></span></span>
  <span class="sb-sep">▸</span>
  <span id="sbItems"></span>
  <span class="sb-right">
    <span class="sb-date mono" id="sbDate"></span>
    <button class="theme-btn" id="themeBtn" aria-label="Toggle theme" title="Toggle theme">◐</button>
  </span>
</div>

<div class="frame">
  <!-- ============ SIDEBAR ============ -->
  <nav class="sidebar" id="sidebar" aria-label="Modules">
    <button class="side-search" id="openPalette">
      <span>⌘</span> Search or jump to… <kbd>⌘K</kbd>
    </button>
    <div id="navList"></div>
    <div class="side-footer">
      <div class="xp-row">
        <div class="xp-avatar">A</div>
        <div class="xp-meta">
          <div class="xp-name">Himnish Sorathiya</div>
          <div class="xp-level">LVL 12 · 2,840 XP · 🔥 21-day streak</div>
          <div class="xp-bar"><i></i></div>
        </div>
      </div>
    </div>

    <svg class="ring" width="${size}" height="${size}">
      <circle class="track" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke-width="${sw}"/>
      <circle class="prog" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(${hue})" stroke-width="${sw}" stroke-dasharray="${c}" stroke-dashoffset="${c * (1 - pct / 100)}"/>
    </svg>
    <div style="position:absolute;inset:0;display:grid;place-items:center" class="mono">
      <span style="font-size:${size > 80 ? 17 : 13}px;font-weight:600">${label || pct + '%'}</span></div></div>`;
}

function askCoach(q) {
  q = (q || '').trim(); if (!q) return;
  const scroll = $('#chatScroll'); if (!scroll) return;
  $('#chatInput').value = '';
  scroll.insertAdjacentHTML('beforeend', `<div class="msg user"></div>`);
  scroll.lastElementChild.textContent = q;
  scroll.insertAdjacentHTML('beforeend', `<div class="msg ai typing"><i></i><i></i><i></i></div>`);
  scroll.scrollTop = scroll.scrollHeight;
  const hit = COACH_RESPONSES.find(c => c.k.test(q));
  setTimeout(() => {
    scroll.lastElementChild.remove();
    scroll.insertAdjacentHTML('beforeend', `<div class="msg ai">${hit ? hit.r : COACH_DEFAULT}</div>`);
    scroll.scrollTop = scroll.scrollHeight;
  }, 900 + Math.random() * 500);
}

        <li><span class="n">–</span><span>The AI Coach does not call a real language model. It matches your question against a set of prewritten response patterns — it's a designed <i>concept</i> of a coaching interface, not a working AI system.</span></li>
        <li><span class="n">–</span><span>I have not run formal user testing on it yet. That's the next step before I'd call any of the UX decisions validated rather than just reasoned through.</span></li>
      </ul>

      <div style="font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);margin:22px 0 6px">What I'd do next</div>
      <p class="b-lede" style="margin-bottom:0">Run 5–8 short interviews with other students to test whether the module set and the daily briefing actually match how they think about their day — then rework whatever the data disagrees with. Roadmap ideas beyond that include real OAuth integrations for Notes and Calendar, wearable data, and eventually a real AI integration for the coach if the concept proves out.</p>
    </div>`;
};

/* ================================================================
   INTERACTIONS — palette, theme, keyboard, boot
   ================================================================ */
const ACTIONS = [
  { label: 'Toggle dark / light mode', k: '⇧T', run: toggleTheme },
  { label: 'Ask the coach: Why am I tired?', k: '', run: () => { showView('coach'); setTimeout(() => askCoach('Why am I tired?'), 300); } },
  { label: 'Log a meal', k: '', run: () => showView('nutrition') },
  { label: 'Add an expense', k: '', run: () => showView('finance') },
  { label: 'Read today’s briefing', k: '', run: () => showView('briefing') },
];
let palSel = 0;
function paletteItems(q) {
  q = q.toLowerCase();
  const mods = MODULES.filter(m => m.label.toLowerCase().includes(q)).map(m => ({ label: 'Go to ' + m.label, hue: m.hue, k: '', run: () => showView(m.id) }));
  const acts = ACTIONS.filter(a => a.label.toLowerCase().includes(q));
  return [...mods, ...acts];
}
function renderPalette() {
  const items = paletteItems($('#paletteInput').value);
  palSel = Math.max(0, Math.min(palSel, items.length - 1));
  $('#paletteList').innerHTML = items.length ? items.map((it, i) =>
    `<button class="pal-item ${i === palSel ? 'sel' : ''}" data-i="${i}" style="--sig:var(${it.hue || '--accent'})"><span class="sig"></span>${it.label}${it.k ? `<span class="k">${it.k}</span>` : ''}</button>`).join('')
    : '<div class="pal-empty">No matches. Try a module name or an action.</div>';
  document.querySelectorAll('.pal-item').forEach(b => b.onclick = () => { closePalette(); items[+b.dataset.i].run(); });
}
function openPalette() { $('#paletteOverlay').classList.add('open'); $('#paletteInput').value = ''; palSel = 0; renderPalette(); $('#paletteInput').focus(); }
function closePalette() { $('#paletteOverlay').classList.remove('open'); }
function toggleTheme() {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  showView(currentView); // re-render so charts pick up new token values
}

$('#openPalette').onclick = openPalette;
$('#themeBtn').onclick = toggleTheme;
$('#menuBtn').onclick = () => $('#sidebar').classList.toggle('open');
$('#paletteOverlay').onclick = e => { if (e.target === $('#paletteOverlay')) closePalette(); };
$('#paletteInput').oninput = () => { palSel = 0; renderPalette(); };
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); $('#paletteOverlay').classList.contains('open') ? closePalette() : openPalette(); }
  if (!$('#paletteOverlay').classList.contains('open')) return;
  const items = paletteItems($('#paletteInput').value);
  if (e.key === 'Escape') closePalette();
  if (e.key === 'ArrowDown') { e.preventDefault(); palSel++; renderPalette(); }
  if (e.key === 'ArrowUp') { e.preventDefault(); palSel--; renderPalette(); }
  if (e.key === 'Enter' && items[palSel]) { closePalette(); items[palSel].run(); }
});

/* ---------- boot ---------- */
renderStatusbar();
renderNav();
showView('home');
</script>
</body>
</html>
